<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GameHub</title>

  <link rel="stylesheet" href="./css/reset.css">
  <link rel="stylesheet" href="./css/general.css">
  <link rel="stylesheet" href="./css/home.css">
  <script type="module" src="./js/home.js"></script>
</head>
<body>
  <header>
    <h1>Gamehub</h1>

    <nav>
      <button type="button" id="sign-in">Inloggen</button>
      <button type="button" id="sign-up">Registreren</button>
    </nav>
  </header>

  <main>
    <form class="search-form">
      <input type="search" id="search-game" placeholder="Zoeken">
      <button type="button" id="search-button"><img src="./assets/magnifying-glass.png"></button>
      <button type="button" id="sort-button"><img src="./assets/three-lines.png"></button>
    </form>

    <form class="sort-form">
      <button type="button" id="sort-name">Naam</button>
      <button type="button" id="sort-developer">Ontwikkelaar</button>
      <button type="button" id="sort-date">Datum</button>
    </form>
    
    <ul id="game-list"></ul>
  </main>
</body>
</html>
