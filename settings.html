<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings</title>
    <link rel="stylesheet" href="./css/reset.css">
    <link rel="stylesheet" href="./css/general.css">
    <link rel="stylesheet" href="./css/settings.css">

    <script type="module" src="./js/main.js"></script>
    <script type="module" src="./js/settings.js"></script>
</head>
<body>
    <header>
      <nav id="navigation-menu"></nav>

        <img src="./assets/left-arrow.png" id="arrow">
        <p id="backtext">Games</p>
    </header>
    <main>
        <h1>Instellingen</h1>
        <section class="search-bar">
            <form class="search-options">
                <input type="text" id="txt-search" placeholder="Zoeken">
                <button type="button" id="btn-search"><img src="./assets/search-icon.png"></button>
            </form>
        </section>
        <section class="settings-tabs">
          <div class="tab">
            <div class="tab-header">
              <h2>Account</h2>
              <span class="arrow-down">▼</span>
            </div>
            <div class="tab-content">
              <label>Gebruikersnaam</label>
              <input type="text" placeholder="Jouw Gebruikersnaam">

              <label class="setting-item">
                <span>E-mail meldingen</span>
                <input type="checkbox">
              </label>
            </div>
          </div>

          <div class="tab">
            <div class="tab-header">
              <h2>Meldingen</h2>
              <span class="arrow-down">▼</span>
            </div>
            <div class="tab-content">
              <label class="setting-item">
                <span>Push meldingen</span>
                <input type="checkbox">
              </label>

              <label>Volume</label>
              <input type="range">
            </div>
          </div>

          <div class="tab">
            <div class="tab-header">
              <h2>Privacy & Veiligheid</h2>
              <span class="arrow-down">▼</span>
            </div>
            <div class="tab-content">
              <label class="setting-item">
                <span>Profiel zichtbaarheid</span>
                <input type="checkbox">
              </label>

              <label class="setting-item">
                <span>Two-factor authentication</span>
                <input type="checkbox">
              </label>
            </div>
          </div>

          <div class="tab">
            <div class="tab-header">
              <h2>Dark Modus</h2>
            </div>
            <div class="tab-content show">
              <label class="switch">
                <input type="checkbox">
                <span class="slider"></span>
              </label>
            </div>
          </div>
        </section>
    </main>
    
</body>
</html>
