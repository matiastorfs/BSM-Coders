<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GameHub</title>
    <link rel="icon" type="image/png" href="./assets/console.png" />

    <link rel="stylesheet" href="./css/reset.css" />
    <link rel="stylesheet" href="./css/general.css" />
    <link rel="stylesheet" href="./css/home.css" />
   
    <script type="module" src="./js/main.js"></script>
    <script type="module" src="./js/darkMode.js"></script>
    <script type="module" src="./js/home.js"></script>
  </head>
  <body>
    <header>
      <nav>
        <section class="nav-bar">
          <button type="button" class="toggle-menu" id="btn-menu">
            <img src="./assets/menu.png" />
          </button>

          <button type="button" id="btn-account">
            <img id="idle" src="./assets/account-icon-light.png" />
          </button>
        </section>

        <section class="nav-menu">
          <button type="button" class="toggle-menu">
            <img src="./assets/close-icon.png" id="btn-exit" />
          </button>

          <a href="./home.html">
            <em>Home</em>
            <img src="./assets/home-icon.png" />
          </a>
          <a href="./guess-that-game/guess-that-game-homepagina.html">
            <em>Raad Het Spel</em>
            <img src="./assets/guess-icon.png" />
          </a>
          <a href="./settings.html">
            <em>Instellingen</em>
            <img src="./assets/setting-icon.png" />
          </a>
        </section>
      </nav>

      <h1>Gamehub</h1>
    </header>

    <main>
      <section class="friends">
        <h3>Vrienden <img src="./assets/right-arrow.png" /></h3>
        <ul id="list-friends"></ul>
      </section>

      <section class="favorites">
        <h3>Favorieten <img src="./assets/right-arrow.png" /></h3>
        <ul class="game-cards" id="list-favorites"></ul>
      </section>

      <section>
        <h3>Alle Games <img src="./assets/right-arrow.png" /></h3>

        <article class="search-bar">
          <form class="search-buttons">
            <input type="text" id="txt-search" placeholder="Zoeken" />
            
            <button type="button" id="btn-search">
              <img src="./assets/search-icon.png" />
            </button>
            <button type="button" id="btn-sort">
              <img src="./assets/sort-icon.png" />
            </button>
          </form>
          <form class="sort-buttons">
            <button type="button" class="sort-button" id="sort-name">Naam</button>
            <button type="button" class="sort-button" id="sort-developer">Ontwikkelaar</button>
            <button type="button" class="sort-button" id="sort-date">Datum</button>
          </form>
        </article>

        <ul class="game-cards" id="list-games"></ul>
      </section>
    </main>
  </body>
</html>
