<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GameHub</title>

  <link rel="stylesheet" href="./css/reset.css">
  <link rel="stylesheet" href="./css/general.css">
  <link rel="stylesheet" href="./css/home.css">
  <script type="module" src="./js/home.js"></script>
</head>
<body>
  <header>
    <nav>
      <button type="button" id="btn-menu">
        <img src="./assets/menu.png">
      </button>
      
      <button type="button" id="btn-account">
        <img id="idle" src="./assets/account-icon-light.png">
      </button>
    </nav>

    <h1>Gamehub</h1>
  </header>

  <main>
    <section class="friends">
      <h3>Vrienden <img src="./assets/right-arrow.png"></h3>
      <ul id="list-friends"></ul>
    </section>

    <section class="favorites">
      <h3>Favorieten <img src="./assets/right-arrow.png"></h3>
      <ul class="list-games" id="list-favorites"></ul>
    </section>
  
    <section>
      <h3>Alle Games <img src="./assets/right-arrow.png"></h3>
      <section class="search-bar">
        <form class="search-options">
          <input type="text" id="txt-search" placeholder="Zoeken">
          <button type="button" id="btn-search"><img src="./assets/search-icon.png"></button>
          <button type="button" id="btn-sort"><img src="./assets/sort-icon.png"></button>
        </form>

        <form class="sort-options"></form>
      </section>
      <ul class="list-games" id="list-search"></ul>
    </section>
  </main>

  <!-- <footer>
    <p>&copy;BSM-Coders</p>
  </footer> -->
</body>
</html>
