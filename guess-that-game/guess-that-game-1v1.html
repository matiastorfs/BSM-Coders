<!DOCTYPE html>
<html lang="NL">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guess That Game 1v1</title>
    <link rel="stylesheet" href="../css/reset.css">
    <link rel="stylesheet" href="../css/general.css">
    <link rel="stylesheet" href="./css/guessthatgame.css">
    <script type="module" src="./js/guess-that-game.js"></script>
</head>
<body>
    <header>
    </header>
    <main>
        <h1>De Raad Het Spel Minigame</h1>
        <section class="modeSelection">
            <button class="modeButton inactive" id="soloPlay">Solo Spel</button>
            <button class="modeButton active" id="1v1">1v1</button>
        </section>
        <article class="1v1play lowestOne">
          <img src="./assets/1V1img.png" class="difficultie"/>
          <div class="title"><em>Een andere speler uitdagen</em></div>
          <div class="description">Ben jij klaar om het tegen een andere speler op te nemen in Raad Het Spel.</div>
          <div class="stargroup">
            <img src="./assets/Star.png" class="star" />
            <img src="./assets/Star.png" class="star" />
            <img src="./assets/Star.png" class="star" />
            <img src="./assets/Star.png" class="star" />
            <img src="./assets/Star.png" class="star" />
          </div>
        </article>
      <h1 id="rankTitle">Ranking 🏆</h1>
      <section class="ranking" id="rankingList"></section>
    </main>
    <footer>
      <ul>
        <li onclick="window.location.href = '../homepage-logged-out.html'">
          <img src="../assets/StarIcon.png" class="footerIcons"> 
          <div>Spelen</div>
        </li>
        <li>
          <img src="../assets/StarIconActive.png" class="footerIcons"> 
          <div>Raad Het Spel</div>
        </li>
        <li onclick="window.location.href = '../homepage-logged-out.html'" id="settingsbuttonhover">
          <img src="../assets/SettingsIcon.png" class="footerIcons" id="settingsicon"> 
          <div>Instellingen</div>
        </li>
      </ul>
    </footer>
</body>
</html>
